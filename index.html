<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BotNBolt - Multi-Role Dashboard</title>
  
  <!-- Inter Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  
  <!-- CSS Stylesheet -->
  <link rel="stylesheet" href="styles.css?v=2">
  
  <!-- Chart.js CDN -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  
  <!-- Lucide Icons CDN -->
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

  <div class="app-container">
    
    <!-- Sidebar Navigation -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-logo">
          <img src="old-logo.png" alt="BotNBolt Logo">
        </div>
      </div>
      
      <!-- Role Switcher Panel -->
      <div class="role-picker-container">
        <div class="role-picker-label">Active Workspace Role</div>
        <select class="role-picker-select" id="roleSelector" onchange="window.BotNBoltApp.switchRole(this.value)">
          <option value="superAdmin">Super Admin</option>
          <option value="companyAdmin">Company Admin (HQ)</option>
          <option value="dealer">Dealer Portal</option>
          <option value="supportAdmin">Support Dashboard</option>
        </select>
      </div>
      
      <!-- Navigation Links Container -->
      <nav class="sidebar-nav" id="sidebarNav">
        <!-- Links will be dynamically populated by app.js based on role -->
      </nav>
      
      <!-- User Profile Badge Footer -->
      <div class="sidebar-footer">
        <div class="user-avatar flex-center" id="userAvatar">SA</div>
        <div class="user-info">
          <div class="user-name" id="userName">Nihit Sharma</div>
          <div class="user-role-badge" id="userRoleBadge">Super Admin</div>
        </div>
      </div>
    </aside>
    
    <!-- Main Right Content Canvas -->
    <main class="main-layout">
      
      <!-- Top Navigation Header -->
      <header class="top-header">
        <div class="header-left">
          <button class="menu-toggle-btn" id="menuToggle" onclick="window.BotNBoltApp.toggleSidebar()">
            <i data-lucide="menu"></i>
          </button>
          <div class="page-title-container">
            <h2 id="pageTitle">Dashboard Overview</h2>
            <p id="pageSubtitle">System status and metric aggregates</p>
          </div>
          <!-- Centered search bar pill matching Fynpro -->
          <div class="search-wrapper" style="margin-left: 24px; min-width: 240px; position: relative;">
            <i data-lucide="search" style="width: 14px; height: 14px; top: 50%; transform: translateY(-50%); position: absolute; left: 12px; color: var(--text-secondary); pointer-events: none;"></i>
            <input type="text" placeholder="Search logs, tickets..." class="form-control" style="padding-left: 36px; border-radius: 9999px; background-color: var(--bg-app); border: none; font-size: 0.8rem; height: 36px;" oninput="console.log('Quick search triggered...')">
          </div>
        </div>
        
        <div class="header-right">
          <!-- History Icon -->
          <button class="theme-toggle-btn" onclick="alert('Viewing recent page activity history...')" title="Recent History">
            <i data-lucide="history"></i>
          </button>
          <!-- Chat / Comments Icon -->
          <button class="theme-toggle-btn" onclick="alert('Opening collaboration chat channels...')" title="Team Chat">
            <i data-lucide="message-square"></i>
          </button>
          <!-- Collab / Share Icon -->
          <button class="theme-toggle-btn" onclick="alert('Generating workspace sharing link...')" title="Collab & Share">
            <i data-lucide="share-2"></i>
          </button>
          <!-- Checkmark / ToDo Tasks Icon -->
          <button class="theme-toggle-btn" onclick="alert('Opening My To-Do Checklist panel...')" title="My To-Do Items">
            <i data-lucide="check-square"></i>
          </button>
          
          <!-- Light/Dark Toggle -->
          <button class="theme-toggle-btn" onclick="window.BotNBoltApp.toggleTheme()" title="Toggle Theme">
            <i data-lucide="sun" id="themeIcon"></i>
          </button>
          
          <!-- Notifications -->
          <div class="notifications-dropdown" onclick="window.BotNBoltApp.showNotifications()" title="Notifications">
            <i data-lucide="bell"></i>
            <span class="notification-badge-dot" id="notifDot"></span>
          </div>
          
          <!-- Sync Data Trigger -->
          <button class="btn btn-secondary btn-sm flex-center" onclick="window.BotNBoltApp.resetState()" title="Reset Session Data">
            <i data-lucide="rotate-ccw"></i> Reset
          </button>
        </div>
      </header>
      
      <!-- Category Selection Bar -->
      <div class="category-selection-bar" id="categorySelectionBar"></div>

      <!-- Canvas dynamic loading view -->
      <section class="content-canvas" id="contentCanvas">
        <!-- Dashboard panels rendered dynamically by app.js -->
      </section>
      
    </main>
    
  </div>

  <!-- Reusable Modal System Container -->
  <div class="modal-overlay" id="modalOverlay" onclick="window.BotNBoltApp.closeModal(event)">
    <div class="modal-window">
      <div class="modal-header">
        <h3 id="modalTitle">Modal Form</h3>
        <button class="action-icon-btn" onclick="window.BotNBoltApp.closeModalForce()"><i data-lucide="x"></i></button>
      </div>
      <div class="modal-body" id="modalBody">
        <!-- Form elements appended dynamically -->
      </div>
      <div class="modal-footer" id="modalFooter">
        <!-- Action Buttons -->
      </div>
    </div>
  </div>

  <!-- Import Scripts -->
  <script src="mockData.js?v=2"></script>
  <script src="app.js?v=2"></script>
  
  <script>
    // Initialize Lucide Icons immediately
    lucide.createIcons();
  </script>
</body>
</html>
